<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="styles.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckey Doc🦆/Agregar Producto</title>
</head>
<header>
    <h1>Duckey Doc🦆 Sistema de Inventario</h1>
    <nav>
        <a href="inicio.html">Inicio</a>
        <a href="productos.html">Mis productos</a>
        <a href="agregar.html">Agregar producto</a>
    </nav>
</header>

<body>
    <section>
        <h2>Agregar Nuevo Producto</h2>
        <p>Cuando creas un producto este se envia a el inicio,para que despues lo guardes en tus productos si deseas</p>
        <form id="product-form" onsubmit="agregarP(event)" >
      
                <label for="product-name">Nombre del producto:</label>
                <input type="text" id="product-name" required>
            
           
                <label for="descripcionP">Descripción:</label>
                <textarea id="descripcionP" required></textarea>
            
            
                <label for="precioP">Precio:</label>
                <input type="number" id="precioP" required>
            <select id="categoriaP" name="categoriaP" required>
                <option value="">Seleccione una categoría</option>
                <option value="electrónica">Electrónica</option>
                <option value="ropa">Ropa</option>
                <option value="hogar">Hogar</option>
                <option value="juguetes">Juguetes</option>
                <option value="otros">Otros</option>
            </select>
            <button type="submit">Agregar Producto</button>
        </form>
    </section>

<script src="agregar.js"></script>
<footer>
   
</footer>
</body>
</html>
