<div id="Editar">
    <button id="cerrar" onclick="cerrarE()">X</button>
    <form onsubmit="editarProd(event)">
        <label for="eN">Nombre:</label>
        <input type="text" id="eN" required>
        <label for="eD">Descripción:</label>
        <textarea id="eD" required></textarea>
        <button type="submit">Guardar Cambios</button>
    </form>
</div>

<div id="calcularmenu">
    <button id="cerrar2" onclick="cerrarC()">Cerrar</button>
    <h2>Calcular precio total</h2>
    <form onsubmit="calcularTotal(event)">
        <P>Calcular precio por categoria(opcional)</P>
        <select id="cCategoria">
            <option value="todo">todos</option>
            <option value="electrónica">Electrónica</option>
            <option value="ropa">Ropa</option>
            <option value="hogar">Hogar</option>
            <option value="juguetes">Juguetes</option>
        </select>
        <button type="submit">Calcular</button>
    </form>
    <h3>Calculo de precio total:</h3>
    <p id="resultado"></p>
</div>
        <section>

            <p>Aqui se mostraran los productos que hallas decido guardar.</p>
            
            <div id="buscarDiv">

                <input type="text" placeholder="Buscar por nombre" id="bN">
                <select id="buscar">
                    <option value="">Buscar por categoria(opcional)</option>
                    <option value="electrónica">Electrónica</option>
                    <option value="ropa">Ropa</option>

            </select> 
        <button type="submit">Buscar</button>
        </form>
        </div>
